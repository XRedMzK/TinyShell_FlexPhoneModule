name: desktop-release-readiness

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Create draft GitHub Release via tauri-action (requires signing secrets)"
        required: true
        type: boolean
        default: false

jobs:
  desktop:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build desktop bundle (readiness check)
        if: ${{ inputs.publish == false }}
        run: npm run tauri -- build

      - name: Validate signing secrets for publish mode
        if: ${{ inputs.publish == true }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing secret: TAURI_SIGNING_PRIVATE_KEY"
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "Missing secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          }

      - name: Draft release via Tauri action
        if: ${{ inputs.publish == true }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client
          tagName: desktop-v__VERSION__
          releaseName: "FlexPhone Desktop v__VERSION__"
          releaseBody: "Automated desktop release generated by desktop-release-readiness workflow."
          releaseDraft: true
          prerelease: true
